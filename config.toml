baseURL = "https://www.bartplasmeijer.nl/"
languageCode = "en-us"
title = "Bart Plasmeijer | AI, Architecture & Engineering"
theme="archie"
copyright = "© Bart Plasmeijer"
# Code Highlight
pygmentsstyle = "monokai"
pygmentscodefences = true
pygmentscodefencesguesssyntax = true

[pagination]
pagerSize = 3 # articles per page

[params]
	mode="dark" # color-mode → light,dark,toggle or auto
	useCDN=false # don't use CDNs for fonts and icons, instead serve them locally.
	subtitle = "My Tech Passion"
	mathjax = true # enable MathJax support
	katex = true # enable KaTeX support
	mainSections = ["posts"]

# Social Tags

[[params.social]]
name = "GitHub"
icon = "github"
url = "https://github.com/bplasmeijer"

[[params.social]]
name = "Twitter"
icon = "twitter"
url = "https://twitter.com/bartplasmeijer"

